version: '3.8'

services:
  ops-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: lanjiaxuan/ops-agent:v4.0
    container_name: ops-agent
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # 数据持久化
      - ops-agent-data:/app/workspace/data
      - ops-agent-logs:/app/workspace/logs
      # K8s 配置（可选）
      - ${HOME}/.kube:/root/.kube:ro
      # 环境变量文件
      - ./.env:/app/.env:ro
    environment:
      # 应用配置
      - APP_NAME=Ops Agent
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # 数据库配置（使用容器内路径）
      - DATABASE_URL=sqlite:////app/workspace/data/ops_agent_v2.db

      # JWT 配置
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}

      # LLM 配置
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo-preview}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

      # 飞书配置
      - FEISHU_ENABLED=${FEISHU_ENABLED:-false}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_CONNECTION_MODE=${FEISHU_CONNECTION_MODE:-auto}

      # K8s 配置
      - K8S_ENABLED=${K8S_ENABLED:-true}
      - KUBECONFIG=/root/.kube/config

      # Prometheus 配置
      - PROMETHEUS_ENABLED=${PROMETHEUS_ENABLED:-false}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-}

      # Loki 配置
      - LOKI_ENABLED=${LOKI_ENABLED:-false}
      - LOKI_URL=${LOKI_URL:-}

      # 初始管理员
      - INITIAL_ADMIN_USERNAME=${INITIAL_ADMIN_USERNAME:-admin}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-admin123}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-admin@ops-agent.local}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - ops-network

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  ops-network:
    driver: bridge

volumes:
  ops-agent-data:
    driver: local
  ops-agent-logs:
    driver: local
